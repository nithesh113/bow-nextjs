services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: bow-nextjs:latest
    container_name: bow-web
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-3000}:${CONTAINER_PORT:-3000}"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # Postgres runs *next to* the app if you want a fully self-contained
  # deployment. Currently BOW uses Neon (serverless Postgres), so this
  # service is commented out. To switch on a VPS, just uncomment and
  # set DATABASE_URL=postgresql://bow:bow@db:5432/bow in .env.
